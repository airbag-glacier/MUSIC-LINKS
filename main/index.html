<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Garcia | Music Links</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Removed the period before body to correctly target the HTML tag */
        body {
            background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
        }
        .link-card {
            transition: all 0.3s ease;
        }
        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col items-center py-12 px-4 font-sans">

    <main class="w-full max-w-md flex flex-col items-center">
<img src="755b9ca4-b078-418e-985f-dd28986cd113.jpg" alt="Gabriel Garcia" class="w-32 h-32 rounded-full border-4 border-gray-700 shadow-lg mb-4 object-cover object-center">        
        <h1 class="text-3xl font-bold mb-2 tracking-wide">Gabriel Garcia</h1>
        <p class="text-gray-400 text-center mb-8 px-4">Latest single "Far Away" out now on all major platforms. 🎧</p>

        <div class="w-full flex flex-col space-y-4">
            
            <a href="https://open.spotify.com/artist/0czgfH1L4qDxX1VBcrNw69" class="link-card flex items-center p-4 bg-gray-800 rounded-xl border border-gray-700 hover:border-[#1DB954] hover:bg-gray-750 group">
                <i class="fa-brands fa-spotify text-2xl text-[#1DB954] w-10 text-center"></i>
                <span class="flex-grow font-semibold text-lg text-center pr-10 group-hover:text-[#1DB954] transition-colors">Listen on Spotify</span>
            </a>

            <a href="https://music.apple.com/us/song/far-away/1872453679" class="link-card flex items-center p-4 bg-gray-800 rounded-xl border border-gray-700 hover:border-[#FA243C] hover:bg-gray-750 group">
                <i class="fa-brands fa-apple text-2xl text-[#FA243C] w-10 text-center"></i>
                <span class="flex-grow font-semibold text-lg text-center pr-10 group-hover:text-[#FA243C] transition-colors">Apple Music</span>
            </a>

            <a href="https://youtu.be/lFkAbQ3PegI?si=JmNTKxEQqxJCvSaF" class="link-card flex items-center p-4 bg-gray-800 rounded-xl border border-gray-700 hover:border-[#FF0000] hover:bg-gray-750 group">
                <i class="fa-brands fa-youtube text-2xl text-[#FF0000] w-10 text-center"></i>
                <span class="flex-grow font-semibold text-lg text-center pr-10 group-hover:text-[#FF0000] transition-colors">Watch on YouTube</span>
            </a>

            <a href="https://on.soundcloud.com/XgvE5aHUyDegwn0wIb" class="link-card flex items-center p-4 bg-gray-800 rounded-xl border border-gray-700 hover:border-[#FF5500] hover:bg-gray-750 group">
                <i class="fa-brands fa-soundcloud text-2xl text-[#FF5500] w-10 text-center"></i>
                <span class="flex-grow font-semibold text-lg text-center pr-10 group-hover:text-[#FF5500] transition-colors">SoundCloud</span>
            </a>

            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/09OFKRqtlm6OTTK7bRM6CD?utm_source=generator&theme=0" 
            width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy"></iframe>

            <iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" frameborder="0" height="175" style="width:100%;max-width:660px;overflow:hidden;border-radius:10px;" 
            sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" 
            src="https://embed.music.apple.com/us/song/far-away/1872453679"></iframe>

            <iframe width="100%" height="250" src="https://www.youtube-nocookie.com/embed/IKT5kiat6gY?si=KnuQOug24si12hdx" title="YouTube video player" frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" 
            src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A1704461109&color=%23545454&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
            <div style="font-size: 10px; color: #cccccc;line-break: anywhere;word-break: normal;overflow: hidden;white-space: nowrap;text-overflow: ellipsis; font-family: Interstate,Lucida Grande,Lucida Sans Unicode,Lucida Sans,Garuda,Verdana,Tahoma,sans-serif;font-weight: 100;">
                <a href="https://soundcloud.com/gabriel-garcia-407956635" title="Gabriel Garcia" target="_blank" style="color: #cccccc; text-decoration: none;">Gabriel Garcia</a> · 
                <a href="https://soundcloud.com/gabriel-garcia-407956635/far-away" title="Far Away" target="_blank" style="color: #cccccc; text-decoration: none;">Far Away</a></div>

        </div>

        <button id="shareBtn" class="mt-10 px-6 py-2 bg-gray-700 hover:bg-gray-600 rounded-full font-medium transition-colors flex items-center space-x-2">
            <i class="fa-solid fa-share-nodes"></i>
            <span>Share Profile</span>
        </button>
    </main>

    <footer class="mt-auto pt-10 text-gray-500 text-sm">
        <p>© <span id="year"></span> Gabriel Garcia. All rights reserved.</p>
    </footer>

    <script>
        // Set dynamic copyright year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Share button logic
        const shareBtn = document.getElementById('shareBtn');
        shareBtn.addEventListener('click', async () => {
            const shareData = {
                title: 'Gabriel Garcia | Music Links',
                text: 'Check out my latest music across all platforms!',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    const originalText = shareBtn.innerHTML;
                    shareBtn.innerHTML = '<i class="fa-solid fa-check"></i><span>Link Copied!</span>';
                    setTimeout(() => {
                        shareBtn.innerHTML = originalText;
                    }, 2000);
                }
            } catch (err) {
                console.error('Error sharing:', err);
            }
        });
    </script>
</body>
</html>
